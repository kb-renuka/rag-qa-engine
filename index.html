<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Q&amp;A Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #ECEFE9; min-height: 100vh; font-family: 'IBM Plex Sans', sans-serif; }
  .page { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useCallback } = React;

const STOPWORDS = new Set([
  "the","a","an","and","or","but","is","are","was","were","be","been","being",
  "to","of","in","on","for","with","as","by","at","from","that","this","these",
  "those","it","its","into","than","then","so","such","can","could","should",
  "would","will","shall","may","might","not","no","do","does","did","have",
  "has","had","if","about","because","while","which","who","whom","what",
  "when","where","how","why","their","there","here","also","using","use",
  "used","between","each","more","most","some","any","all","both",
]);

function tokenize(text) {
  return (text.toLowerCase().match(/[a-z0-9]+/g) || []).filter(
    (w) => w.length > 2 && !STOPWORDS.has(w)
  );
}

function chunkText(text, title, docId, size = 480, overlap = 80) {
  const paras = text.split(/\n\s*\n/).map((p) => p.trim()).filter(Boolean);
  const chunks = [];
  let buffer = "";
  paras.forEach((p) => {
    if ((buffer + " " + p).length > size && buffer.length > 0) {
      chunks.push(buffer.trim());
      buffer = buffer.slice(Math.max(0, buffer.length - overlap));
    }
    buffer = (buffer + " " + p).trim();
  });
  if (buffer.trim()) chunks.push(buffer.trim());
  return chunks.map((text, i) => ({ id: `${docId}-${i}`, docId, docTitle: title, text }));
}

function buildIndex(chunks) {
  const tokensByChunk = chunks.map((c) => tokenize(c.text));
  const vocab = new Map();
  tokensByChunk.forEach((tokens) => {
    new Set(tokens).forEach((t) => vocab.set(t, (vocab.get(t) || 0) + 1));
  });
  const N = chunks.length || 1;
  const idf = new Map();
  vocab.forEach((df, term) => idf.set(term, Math.log((N + 1) / (df + 0.5)) + 1));

  const vectors = tokensByChunk.map((tokens) => {
    const tf = new Map();
    tokens.forEach((t) => tf.set(t, (tf.get(t) || 0) + 1));
    const vec = new Map();
    tf.forEach((count, term) => vec.set(term, (count / tokens.length) * (idf.get(term) || 0)));
    return vec;
  });

  return { idf, vectors };
}

function vectorize(tokens, idf) {
  const tf = new Map();
  tokens.forEach((t) => tf.set(t, (tf.get(t) || 0) + 1));
  const vec = new Map();
  tf.forEach((count, term) => {
    if (idf.has(term)) vec.set(term, (count / tokens.length) * idf.get(term));
  });
  return vec;
}

function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  a.forEach((v, k) => { na += v * v; if (b.has(k)) dot += v * b.get(k); });
  b.forEach((v) => (nb += v * v));
  if (na === 0 || nb === 0) return 0;
  return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

function highlightMatches(text, queryTokens) {
  if (!queryTokens.length) return text;
  const pattern = new RegExp(`\\b(${queryTokens.join("|")})\\b`, "gi");
  const parts = text.split(pattern);
  return parts.map((part, i) =>
    queryTokens.some((t) => t.toLowerCase() === part.toLowerCase())
      ? <mark key={i} className="hit">{part}</mark>
      : <span key={i}>{part}</span>
  );
}

const SAMPLE_DOCS = [
  {
    title: "Backend scaling notes",
    text: `Rate limiting protects a service from being overwhelmed by too many requests in a short window. The token bucket algorithm keeps a bucket of tokens that refills at a fixed rate; each incoming request consumes one token, and requests are rejected once the bucket is empty. This allows short bursts up to the bucket capacity while enforcing a steady long-term rate. Leaky bucket smooths bursts into a constant output rate instead of allowing them through.

An LRU cache evicts the least recently used item once it reaches capacity. It is commonly implemented with a hash map for O(1) lookups paired with a doubly linked list that tracks recency order, so both reads and writes stay O(1). Every access moves an item to the most-recently-used end of the list, and the item at the opposite end is the eviction candidate.

Load balancing distributes incoming requests across a pool of servers so no single server becomes a bottleneck. Round robin cycles through servers in order regardless of their current load, which is simple but can overload a slow server. Least connections routes each request to whichever server currently has the fewest active connections, which tends to balance load more evenly when requests take varying amounts of time to complete. Health checks let a load balancer stop routing traffic to a server that has failed.

Layer 4 load balancing operates at the transport layer using IP and port information, while layer 7 load balancing inspects the actual HTTP request, so it can route based on URL path, headers, or cookies. Layer 7 is more flexible but adds processing overhead.`,
  },
];

function Composer({ onSubmit, disabled }) {
  const [value, setValue] = useState("");
  return (
    <form
      onSubmit={(e) => {
        e.preventDefault();
        if (!value.trim() || disabled) return;
        onSubmit(value.trim());
        setValue("");
      }}
      className="composer"
    >
      <input
        type="text"
        placeholder="Ask a question about the documents above…"
        value={value}
        onChange={(e) => setValue(e.target.value)}
        disabled={disabled}
      />
      <button type="submit" disabled={disabled || !value.trim()}>
        {disabled ? "Retrieving…" : "Ask"}
      </button>
    </form>
  );
}

function RagQAEngine() {
  const [apiKey, setApiKey] = useState("");
  const [documents, setDocuments] = useState(() => SAMPLE_DOCS.map((d, i) => ({ id: `doc-${i}`, ...d })));
  const [showAdd, setShowAdd] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newText, setNewText] = useState("");
  const [history, setHistory] = useState([]);
  const [isLoading, setIsLoading] = useState(false);
  const [error, setError] = useState(null);
  const [flashId, setFlashId] = useState(null);
  const cardRefs = useRef({});

  const chunks = useMemo(() => documents.flatMap((d) => chunkText(d.text, d.title, d.id)), [documents]);

  const addDocument = () => {
    if (!newTitle.trim() || !newText.trim()) return;
    setDocuments((docs) => [...docs, { id: `doc-${Date.now()}`, title: newTitle.trim(), text: newText.trim() }]);
    setNewTitle("");
    setNewText("");
    setShowAdd(false);
  };

  const removeDocument = (id) => setDocuments((docs) => docs.filter((d) => d.id !== id));

  const scrollToCard = (id) => {
    setFlashId(id);
    cardRefs.current[id]?.scrollIntoView({ behavior: "smooth", block: "nearest" });
    setTimeout(() => setFlashId(null), 1200);
  };

  const handleAsk = useCallback(async (question) => {
    setError(null);
    if (chunks.length === 0) { setError("Add at least one document before asking a question."); return; }
    setIsLoading(true);
    try {
      const { idf, vectors } = buildIndex(chunks);
      const qTokens = tokenize(question);
      const qVec = vectorize(qTokens, idf);
      const ranked = chunks
        .map((c, i) => ({ chunk: c, score: cosineSim(qVec, vectors[i]) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 4)
        .filter((r) => r.score > 0);

      const citations = ranked.map((r, i) => ({
        n: i + 1, chunkId: r.chunk.id, docTitle: r.chunk.docTitle, excerpt: r.chunk.text, score: r.score,
      }));

      // No API key: fall back to extractive mode -- show the best-matching passage directly, no generation
      if (!apiKey.trim()) {
        const answerText = citations.length
          ? `Based on the top-matching passage [1], here is the most relevant excerpt for your question. (Add an Anthropic API key above to get a full generated answer instead of the raw excerpt.)`
          : "No relevant passages were found in the document library for this question.";
        setHistory((h) => [...h, { id: Date.now(), question, answer: answerText, citations, qTokens }]);
        setIsLoading(false);
        return;
      }

      const contextBlock = citations.length
        ? citations.map((c) => `[${c.n}] (from "${c.docTitle}")\n${c.excerpt}`).join("\n\n")
        : "No relevant passages were found in the document library.";

      const systemPrompt =
        "You are a retrieval-augmented question answering engine. Answer the user's question using ONLY the numbered excerpts provided as context. " +
        "Cite the excerpt number in square brackets, like [1] or [2], right after each claim that depends on it. " +
        "If the excerpts do not contain the answer, say clearly that the documents don't cover it — do not use outside knowledge. Keep the answer concise.";

      const userPrompt = `Context excerpts:\n\n${contextBlock}\n\nQuestion: ${question}`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: userPrompt }],
        }),
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "The model request failed.");

      const answerText = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();

      setHistory((h) => [...h, { id: Date.now(), question, answer: answerText || "No answer was returned.", citations, qTokens }]);
    } catch (e) {
      setError(e.message || "Something went wrong answering that question.");
    } finally {
      setIsLoading(false);
    }
  }, [chunks, apiKey]);

  const renderAnswer = (text, citations) => {
    const parts = text.split(/(\[\d+\])/g);
    return parts.map((part, i) => {
      const m = part.match(/^\[(\d+)\]$/);
      if (m) {
        const n = Number(m[1]);
        const cite = citations.find((c) => c.n === n);
        return (
          <button key={i} className="cite-tag" onClick={() => cite && scrollToCard(cite.chunkId)} title={cite ? `Jump to source: ${cite.docTitle}` : ""}>
            {part}
          </button>
        );
      }
      return <span key={i}>{part}</span>;
    });
  };

  return (
    <div className="rag-root">
      <p className="eyebrow">RAG Q&amp;A engine</p>
      <h2 className="headline">Ask the documents, not the model</h2>
      <p className="sub">
        Every answer below is retrieved from the source library on the left, ranked by
        TF-IDF similarity, then handed to Claude with citations required. Click any
        [n] marker in an answer to jump to the excerpt it came from.
      </p>

      <div className="key-row">
        <input
          type="password"
          placeholder="Optional: paste an Anthropic API key for a full generated answer (sk-ant-...)"
          value={apiKey}
          onChange={(e) => setApiKey(e.target.value)}
        />
        <span className="key-hint">Optional — without a key, you'll see the best-matching passage directly. Key is stored only in this tab's memory, never saved or sent anywhere but api.anthropic.com.</span>
      </div>

      <div className="layout">
        <div>
          <p className="panel-label">
            Source library ({documents.length})
            <button className="icon-btn" onClick={() => setShowAdd((s) => !s)}>{showAdd ? "cancel" : "+ add doc"}</button>
          </p>

          {documents.map((doc) => (
            <div className="doc-card" key={doc.id}>
              <button className="doc-remove" onClick={() => removeDocument(doc.id)} aria-label={`Remove ${doc.title}`}>×</button>
              <p className="doc-title">{doc.title}</p>
              <p className="doc-preview">{doc.text}</p>
            </div>
          ))}

          {documents.length === 0 && <div className="empty-state">No documents yet. Add one to get started.</div>}

          {showAdd && (
            <div className="add-form">
              <input placeholder="Document title" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} />
              <textarea placeholder="Paste source text here…" value={newText} onChange={(e) => setNewText(e.target.value)} />
              <div className="add-form-actions">
                <button onClick={addDocument}>Add to library</button>
                <button className="ghost" onClick={() => setShowAdd(false)}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        <div className="qa-panel">
          <Composer onSubmit={handleAsk} disabled={isLoading} />
          {error && <p className="error-msg">{error}</p>}

          <div className="thread">
            {history.length === 0 && !isLoading && (
              <div className="empty-state">Ask a question above — try "how does least connections load balancing work?"</div>
            )}
            {history.slice().reverse().map((entry) => (
              <div className="qa-entry" key={entry.id}>
                <p className="q-text">{entry.question}</p>
                <p className="a-text">{renderAnswer(entry.answer, entry.citations)}</p>

                {entry.citations.length > 0 && (
                  <React.Fragment>
                    <p className="ledger-label">Evidence</p>
                    <div className="ledger">
                      {entry.citations.map((c) => (
                        <div className={`ev-card${flashId === c.chunkId ? " flash" : ""}`} key={c.chunkId} ref={(el) => (cardRefs.current[c.chunkId] = el)}>
                          <div className="ev-head">
                            <span className="ev-num">[{c.n}]</span>
                            <span className="ev-source">{c.docTitle}</span>
                            <span className="ev-score">sim {c.score.toFixed(2)}</span>
                          </div>
                          <p className="ev-excerpt">{highlightMatches(c.excerpt, entry.qTokens)}</p>
                        </div>
                      ))}
                    </div>
                  </React.Fragment>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <div className="page"><RagQAEngine /></div>
);
</script>

<style>
  .rag-root {
    --paper: #F1F3EE; --paper-2: #E7EAE2; --ink: #1C231F; --ink-muted: #5B6660;
    --line: rgba(28,35,31,0.14); --accent: #2B5D53; --accent-ink: #EAF3EF;
    --highlight: #F0B93D; --highlight-ink: #402E05; --danger: #A03B3B;
    font-family: 'IBM Plex Sans', sans-serif; color: var(--ink); background: var(--paper);
    border-radius: 16px; padding: 2rem; max-width: 100%; box-sizing: border-box;
  }
  .rag-root * { box-sizing: border-box; }
  .eyebrow { font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin:0 0 6px; }
  .headline { font-family:'Source Serif 4', serif; font-size:28px; font-weight:600; margin:0 0 6px; line-height:1.2; }
  .sub { font-size:14px; color:var(--ink-muted); margin:0 0 1.25rem; max-width:560px; line-height:1.5; }
  .key-row { margin-bottom: 1.5rem; }
  .key-row input { width:100%; font-family:'IBM Plex Mono', monospace; font-size:13px; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--paper-2); color:var(--ink); margin-bottom:5px; }
  .key-hint { font-size:11.5px; color:var(--ink-muted); }
  .layout { display:grid; grid-template-columns: 300px 1fr; gap:24px; align-items:start; }
  @media (max-width: 720px) { .layout { grid-template-columns:1fr; } }
  .panel-label { font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); margin:0 0 10px; display:flex; justify-content:space-between; align-items:center; }
  .doc-card { background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px; position:relative; }
  .doc-title { font-weight:600; font-size:13.5px; margin:0 0 4px; padding-right:20px; }
  .doc-preview { font-size:12px; color:var(--ink-muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .doc-remove { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--ink-muted); cursor:pointer; font-size:14px; line-height:1; padding:2px; }
  .doc-remove:hover { color:var(--danger); }
  .icon-btn { background:transparent; border:1px solid var(--line); border-radius:7px; color:var(--accent); font-size:11px; font-family:'IBM Plex Mono', monospace; padding:4px 9px; cursor:pointer; }
  .icon-btn:hover { border-color:var(--accent); }
  .add-form { background:var(--paper-2); border:1px dashed var(--line); border-radius:10px; padding:12px; margin-top:4px; }
  .add-form input, .add-form textarea { width:100%; font-family:'IBM Plex Sans', sans-serif; font-size:13px; background:var(--paper); border:1px solid var(--line); border-radius:7px; padding:8px 10px; margin-bottom:8px; color:var(--ink); resize:vertical; }
  .add-form textarea { min-height:90px; }
  .add-form-actions { display:flex; gap:8px; }
  .add-form-actions button { font-size:12px; padding:6px 12px; border-radius:7px; border:1px solid var(--line); background:var(--accent); color:var(--accent-ink); cursor:pointer; font-family:'IBM Plex Sans', sans-serif; }
  .add-form-actions button.ghost { background:transparent; color:var(--ink-muted); }
  .qa-panel { background:var(--paper-2); border:1px solid var(--line); border-radius:12px; padding:18px 18px 16px; }
  .composer { display:flex; gap:8px; margin-bottom:4px; }
  .composer input { flex:1; font-family:'IBM Plex Sans', sans-serif; font-size:14px; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--paper); color:var(--ink); }
  .composer input:focus { outline:2px solid var(--accent); outline-offset:1px; }
  .composer button { font-family:'IBM Plex Sans', sans-serif; font-weight:500; font-size:13.5px; padding:10px 16px; border-radius:8px; border:none; background:var(--accent); color:var(--accent-ink); cursor:pointer; white-space:nowrap; }
  .composer button:disabled { opacity:0.6; cursor:default; }
  .error-msg { color:var(--danger); font-size:13px; margin:8px 0 0; }
  .thread { margin-top:18px; display:flex; flex-direction:column; gap:22px; }
  .qa-entry { border-top:1px solid var(--line); padding-top:16px; }
  .q-text { font-weight:600; font-size:14.5px; margin:0 0 8px; }
  .a-text { font-family:'Source Serif 4', serif; font-size:16px; line-height:1.65; margin:0 0 14px; }
  .cite-tag { font-family:'IBM Plex Mono', monospace; font-size:11px; background:var(--highlight); color:var(--highlight-ink); border:none; border-radius:4px; padding:1px 5px; cursor:pointer; margin:0 1px; vertical-align:2px; }
  .cite-tag:hover { filter:brightness(0.92); }
  .ledger-label { font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); margin:0 0 8px; }
  .ledger { display:flex; flex-direction:column; gap:8px; }
  .ev-card { background:var(--paper); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:6px; padding:10px 12px; transition: box-shadow .3s ease, border-color .3s ease; }
  .ev-card.flash { border-left-color:var(--highlight); box-shadow:0 0 0 2px var(--highlight); }
  .ev-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .ev-num { font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--accent); }
  .ev-source { font-size:11px; color:var(--ink-muted); }
  .ev-score { font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--ink-muted); }
  .ev-excerpt { font-size:12.5px; line-height:1.55; color:var(--ink); }
  mark.hit { background:var(--highlight); color:var(--highlight-ink); border-radius:3px; padding:0 2px; }
  .empty-state { font-size:13px; color:var(--ink-muted); padding:20px 4px; text-align:center; }
</style>
</body>
</html>
